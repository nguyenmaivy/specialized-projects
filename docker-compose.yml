version: '3.8'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=sales_dashboard
      - POSTGRES_USER=sales_user
      - POSTGRES_PASSWORD=123456
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales_user -d sales_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ───────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
      - AUTH_REQUIRED=false
      - SECRET_KEY=change-this-in-production
      - TOKEN_EXPIRE_MINUTES=60
      - RATE_LIMIT=100/minute
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=sales_dashboard
      - POSTGRES_USER=sales_user
      - POSTGRES_PASSWORD=123456
      - OPENROUTER_API_KEY=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
      - OPENROUTER_MODEL=nvidia/nemotron-3-super-120b-a12b:free
    volumes:
      - ./data:/app/../data:ro             # Mount data directory
      - backend-logs:/app/logs             # Persist logs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (Next.js) ────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ─── MongoDB (Optional - for Phase 1) ─────────────────────────────────
  # Uncomment when ready to migrate from CSV to MongoDB
  # mongo:
  #   image: mongo:7
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: admin
  #     MONGO_INITDB_ROOT_PASSWORD: password123
  #   volumes:
  #     - mongo-data:/data/db
  #   restart: unless-stopped

  # ─── Redis (Optional - for Phase 4) ───────────────────────────────────
  # Uncomment when ready to add Redis caching
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

volumes:
  backend-logs:
  postgres-data:
  # mongo-data:
